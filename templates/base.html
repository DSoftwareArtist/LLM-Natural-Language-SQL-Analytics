<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}LLM SQL Analytics{% endblock %}</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #1e3a5f;
        --secondary: #3d5a80;
        --accent: #48cae4;
        --background: #f8f9fa;
        --surface: #ffffff;
        --text-primary: #212529;
        --text-secondary: #6c757d;
        --success: #28a745;
        --error: #dc3545;
        --warning: #ffc107;
        --border: #dee2e6;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--background);
        color: var(--text-primary);
        line-height: 1.6;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px;
      }

      header {
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--secondary) 100%
        );
        color: white;
        padding: 16px 0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .header-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-size: 24px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo-icon {
        width: 40px;
        height: 40px;
        background: var(--accent);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }

      nav {
        display: flex;
        gap: 8px;
      }

      nav a {
        color: rgba(255, 255, 255, 0.9);
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-weight: 500;
        transition: all 0.2s;
      }

      nav a:hover,
      nav a.active {
        background: rgba(255, 255, 255, 0.15);
        color: white;
      }

      main {
        padding: 32px 0;
      }

      .card {
        background: var(--surface);
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        margin-bottom: 24px;
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .card-title {
        font-size: 20px;
        font-weight: 600;
        color: var(--primary);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-primary:hover {
        background: var(--secondary);
      }

      .btn-accent {
        background: var(--accent);
        color: var(--primary);
      }

      .btn-accent:hover {
        background: #3db8d4;
      }

      .btn-secondary {
        background: var(--background);
        color: var(--text-primary);
        border: 1px solid var(--border);
      }

      .btn-secondary:hover {
        background: var(--border);
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-label {
        display: block;
        font-weight: 500;
        margin-bottom: 8px;
        color: var(--text-primary);
      }

      .form-input,
      .form-textarea,
      .form-select {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        transition: border-color 0.2s;
      }

      .form-input:focus,
      .form-textarea:focus,
      .form-select:focus {
        outline: none;
        border-color: var(--accent);
      }

      .form-textarea {
        min-height: 100px;
        resize: vertical;
        font-family: "JetBrains Mono", monospace;
      }

      .form-row {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      .table-container {
        overflow-x: auto;
        margin-top: 16px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        padding: 12px 16px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }

      th {
        background: var(--background);
        font-weight: 600;
        color: var(--text-primary);
      }

      tr:hover {
        background: var(--background);
      }

      .sql-preview {
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 16px;
        border-radius: 8px;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        overflow-x: auto;
        white-space: pre-wrap;
      }

      .result-success {
        color: var(--success);
      }

      .result-error {
        color: var(--error);
      }

      .status-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
      }

      .status-connected {
        background: #d4edda;
        color: #155724;
      }

      .status-disconnected {
        background: #f8d7da;
        color: #721c24;
      }

      .empty-state {
        text-align: center;
        padding: 48px;
        color: var(--text-secondary);
      }

      .empty-state-icon {
        font-size: 48px;
        margin-bottom: 16px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 24px;
      }

      .search-box {
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
      }

      .search-box input {
        flex: 1;
      }

      .alert {
        padding: 16px;
        border-radius: 8px;
        margin-bottom: 16px;
      }

      .alert-error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .alert-success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      footer {
        background: var(--surface);
        border-top: 1px solid var(--border);
        padding: 24px 0;
        text-align: center;
        color: var(--text-secondary);
        font-size: 14px;
        margin-top: 48px;
      }

      @media (max-width: 768px) {
        .form-row {
          grid-template-columns: 1fr;
        }

        .header-content {
          flex-direction: column;
          gap: 16px;
        }

        nav {
          flex-wrap: wrap;
          justify-content: center;
        }
      }
    </style>
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <header>
      <div class="container header-content">
        <div class="logo">
          <div class="logo-icon">🔍</div>
          LLM SQL Analytics
        </div>
        <nav>
          <a
            href="{% url 'query' %}"
            class="{% if request.resolver_match.url_name == 'query' %}active{% endif %}"
            >Query</a
          >
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        {% if messages %} {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %} {% endif %} {% block content %}{% endblock %}
      </div>
    </main>

    <footer>
      <div class="container">LLM SQL Analytics v1.0 &copy; 2026</div>
    </footer>

    {% block extra_js %}{% endblock %}
  </body>
</html>
